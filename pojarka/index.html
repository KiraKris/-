<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пожарная безопасность</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff4d4d, #1a1a1a);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        .phone {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .phone a {
            color: #ff4d4d;
            text-decoration: none;
        }

        .phone a:hover {
            text-decoration: underline;
        }

        .emoji {
            font-size: 40px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="emoji">🚨</div>
    <h1>Пожарная безопасность</h1>
    <p>Пуско-наладочные работы</p>
    <p>Программирование АПС, СОУЭ, АСУД</p>

    <div class="phone">
        <p><a href="tel:+79877387424">+7 (987) 738-74-24</a></p>
        <p><a href="tel:+79060383112">+7 (906) 038-31-12</a></p>
    </div>
</div>

</body>
</html>
