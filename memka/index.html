<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Я ещё держусь</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    img {
      max-width: 250px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    #qrcode {
      margin-top: 20px;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #ff6b6b;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #ff3b3b;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>Я ещё держусь</h1>

  <img src="mem.png" alt="мем">

  <button class="btn" onclick="generateQR()">Сгенерировать QR</button>

  <canvas id="qrcode"></canvas>

  <script>
    function generateQR() {
      const text = "Я ещё держусь 😅";
      const canvas = document.getElementById('qrcode');

      QRCode.toCanvas(canvas, text, {
        width: 200
      }, function (error) {
        if (error) console.error(error);
      });
    }
  </script>

</body>
</html>
