<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Я ещё держусь</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    img {
      max-width: 300px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .btn {
      margin-top: 30px;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #ff6b6b;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #ff3b3b;
      transform: scale(1.05);
    }

    .message {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Когда жизнь давит...</h1>

  <img src="mem.png" alt="Я ещё держусь">

  <button class="btn" onclick="showMessage()">Нажми, если тоже держишься</button>

  <div class="message" id="msg"></div>

  <script>
    function showMessage() {
      const messages = [
        "Держимся вместе 😅",
        "Ещё чуть-чуть и отпуск... наверное",
        "Система на грани, но работает",
        "Не сдаёмся!",
        "Кот одобряет твою стойкость 🐱"
      ];

      const random = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById('msg').innerText = random;
    }
  </script>

</body>
</html>
